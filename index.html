<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="msapplication-TileColor" content="#000000">
  <meta name="msapplication-TileImage" content="/icons/ms-icon-144x144.png">
  <title>Установка на Keenetic Entware Скриптов </title>
  <style>
    :root {
      --bg-light: #f4f4f4;
      --bg-dark: #121212;
      --text-light: #333;
      --text-dark: #eee;
      --btn-bg-light: #007bff;
      --btn-bg-dark: #3399ff;
      --btn-hover-light: #0056b3;
      --btn-hover-dark: #2277dd;
      --shadow-light: rgba(0, 0, 0, 0.1);
      --shadow-dark: rgba(0, 0, 0, 0.7);
      --banner-bg: #f8f8f8;
      --banner-border: #ddd;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark {
      background-color: var(--bg-dark);
      color: var(--text-dark);
    }

    header {
      margin-bottom: 30px;
      text-align: center;
    }

    h1 {
      font-weight: 700;
      font-size: 2rem;
      margin: 0;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      max-width: 600px;
      width: 100%;
    }

    .menu-btn {
      background-color: var(--btn-bg-light);
      border: none;
      color: white;
      font-size: 1.1rem;
      padding: 14px 28px;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
      box-shadow: 0 6px 14px rgba(0, 123, 255, 0.5);
      min-width: 160px;
      font-weight: 600;
      user-select: none;
      flex: 1 1 160px;
      max-width: 250px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }

    .menu-btn:hover {
      background-color: var(--btn-hover-light);
      box-shadow: 0 8px 18px rgba(0, 86, 179, 0.7);
    }

    body.dark .menu-btn {
      background-color: var(--btn-bg-dark);
      box-shadow: 0 6px 14px rgba(51, 153, 255, 0.7);
    }

    body.dark .menu-btn:hover {
      background-color: var(--btn-hover-dark);
      box-shadow: 0 8px 18px rgba(34, 119, 221, 0.9);
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      cursor: pointer;
      background: none;
      border: 2px solid currentColor;
      border-radius: 24px;
      width: 50px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
      font-size: 18px;
      user-select: none;
      transition: border-color 0.3s, color 0.3s;
      z-index: 1000;
    }

    .theme-toggle:hover {
      border-color: #007bff;
      color: #007bff;
    }

    .theme-toggle span {
      pointer-events: none;
      user-select: none;
    }

    footer {
      margin-top: auto;
      padding: 20px 10px;
      font-size: 0.9rem;
      color: #888;
      user-select: none;
    }

    body.dark footer {
      color: #666;
    }

    .pwa-banner {
      position: fixed;
      bottom: 0;
      width: 100%;
      background-color: var(--banner-bg);
      border-top: 1px solid var(--banner-border);
      padding: 10px;
      text-align: center;
      z-index: 1000;
      color: var(--text-light);
    }

    body.dark .pwa-banner {
      background-color: #1e1e1e;
      border-top-color: #444;
      color: var(--text-dark);
    }

    .pwa-banner button {
      margin-left: 10px;
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      background: var(--btn-bg-light);
      color: #fff;
      cursor: pointer;
    }

    body.dark .pwa-banner button {
      background: var(--btn-bg-dark);
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.6rem;
      }

      .menu-btn {
        font-size: 1rem;
        padding: 12px 20px;
        min-width: 140px;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <button class="theme-toggle" aria-label="Переключить тему" onclick="toggleTheme()">
    <span>🌞</span><span>🌙</span>
  </button>

  <header>
    <h1>Разное от @pegakmop</h1>
    <p>Выберите нужный вам скрипт для установки в терминале</p>
    <p>Выберите фильмы и сериалы, в будущем и торренты</p>
    <p>Контакт для связи внизу страницы</p>
    <p>Замотивировать на новые свершения:</p>
    <a href="https://yoomoney.ru/to/410012481566554" class="menu-btn" target="_blank">Юмани</a></br>
    <a href="https://www.tinkoff.ru/rm/seroshtanov.aleksey9/HgzXr74936" class="menu-btn" target="_blank">Тинькоф</a>
  </header>

  <nav aria-label="Меню установки скриптов">
    <button class="menu-btn" onclick="openScript('entware')">💻 Keenetic Entware Scripts</button>
    <button class="menu-btn" onclick="openScript('release')">🖥️ Repository entware Keenetic 📲</button>
    <button class="menu-btn" onclick="openScript('nf')">🖥️ NeoFit entware Keenetic 📲</button>
    <button class="menu-btn" onclick="openScript('q900950b')">🖥️ Piper Pied (дудочник)</button>
  </nav>

  <footer>
    &copy; 2024 <a href='https://t.me/pegakmop'>@pegakmop</a>
  </footer>

  <script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function openScript(script) {
      const pages = {
        'entware': '/entware/',
        'release': '/entware/repository',
        'nf': '/neofit/',
        'q900950b': 'q900950b.htm'
      };
      if (pages[script]) {
        window.location.href = pages[script];
      } else {
        alert('Страница пока недоступна');
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    window.onload = () => {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
      }
    }

    let deferredPrompt = null;

    document.addEventListener('DOMContentLoaded', () => {
      const hash = window.location.hash;
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

      if (hash || isStandalone) return;

      const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !navigator.standalone;
      const isAndroid = /Android/.test(navigator.userAgent);

      if (isIOS) {
        const banner = `<div class="pwa-banner">
          <span>Установи приложение на iPhone/iPad: нажми <img src="/ios-share.svg" style="height:20px;vertical-align:middle;">, затем <img src="/ios-add.svg" style="height:20px;vertical-align:middle;"> «На экран Домой»</span>
          <button onclick="this.parentElement.remove()">Закрыть</button>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', banner);
      }

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const banner = `<div class="pwa-banner">
          <span>Добавить приложение на главный экран ${isAndroid ? 'Android' : 'ПК'}</span>
          <button onclick="handleInstall()">Установить</button>
          <button onclick="this.parentElement.remove()">Закрыть</button>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', banner);
      });
    });

    function handleInstall() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('Установлено');
          }
          deferredPrompt = null;
          document.querySelector('.pwa-banner')?.remove();
        });
      }
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/index.js')
          .then(reg => console.log('ServiceWorker registered:', reg.scope))
          .catch(err => console.log('ServiceWorker registration failed:', err));
      });
    }
  </script>
</body>
</html>
