<head>

  <!-- Основные иконки для платформ -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">

  <title>Установка Entware Скриптов</title>
  <style>
    :root {
      --bg-light: #f4f4f4;
      --bg-dark: #121212;
      --text-light: #333;
      --text-dark: #eee;
      --btn-bg-light: #007bff;
      --btn-bg-dark: #3399ff;
      --btn-hover-light: #0056b3;
      --btn-hover-dark: #2277dd;
      --shadow-light: rgba(0, 0, 0, 0.1);
      --shadow-dark: rgba(0, 0, 0, 0.7);
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-light);
      color: var(--text-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 20px;
      transition: background-color 0.3s, color 0.3s;
    }

    body.dark {
      background-color: var(--bg-dark);
      color: var(--text-dark);
    }

    header {
      margin-bottom: 30px;
      text-align: center;
    }

    h1 {
      font-weight: 700;
      font-size: 2rem;
      margin: 0;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      justify-content: center;
      max-width: 600px;
      width: 100%;
    }

    button.menu-btn {
      background-color: var(--btn-bg-light);
      border: none;
      color: white;
      font-size: 1.1rem;
      padding: 14px 28px;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s;
      box-shadow: 0 6px 14px rgba(0, 123, 255, 0.5);
      min-width: 160px;
      font-weight: 600;
      user-select: none;
      flex: 1 1 160px;
      max-width: 250px;
      text-align: center;
    }

    button.menu-btn:hover {
      background-color: var(--btn-hover-light);
      box-shadow: 0 8px 18px rgba(0, 86, 179, 0.7);
    }

    body.dark button.menu-btn {
      background-color: var(--btn-bg-dark);
      box-shadow: 0 6px 14px rgba(51, 153, 255, 0.7);
    }

    body.dark button.menu-btn:hover {
      background-color: var(--btn-hover-dark);
      box-shadow: 0 8px 18px rgba(34, 119, 221, 0.9);
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      cursor: pointer;
      background: none;
      border: 2px solid currentColor;
      border-radius: 24px;
      width: 50px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
      font-size: 18px;
      user-select: none;
      transition: border-color 0.3s, color 0.3s;
      z-index: 1000;
    }

    .theme-toggle:hover {
      border-color: #007bff;
      color: #007bff;
    }

    .theme-toggle span {
      pointer-events: none;
      user-select: none;
    }

    footer {
      margin-top: auto;
      padding: 20px 10px;
      font-size: 0.9rem;
      color: #888;
      user-select: none;
    }

    body.dark footer {
      color: #666;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.6rem;
      }

      button.menu-btn {
        font-size: 1rem;
        padding: 12px 20px;
        min-width: 140px;
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

  <script>
    function openScript(script) {
      // Сопоставляем имя скрипта с URL файла страницы
      const pages = {
        'sing-box': 'sing-box.html',
        'neofit': 'neofit/',
        'neofittg': 'https://t.me/neofitkeenetic/145',
        'neofitentware': 'neofitentware.html',
        'neofitsb': 'neofitsb.html',
        'neofitxray': 'neofitxray.html',
        'voice': 'voice.html',
        'wg': 'wg.html',
        'awg-generate': 'awg-gen.html',
        'fqdn': 'http://78.47.125.180/staticRoutes/dns',
        'static': 'http://78.47.125.180/staticRoutes/ipv4',
        'awg': 'awg.html',
        'mtskin': 'mtskin.html',
        'mt': 'mt.html',
        'domain': 'domain.html',
        'hydraroute': 'hydraroute.html',
        'hydrarouteold': 'hydrarouteold.html',
        'hrneo': 'hrneo.html',
        'w4s': 'w4s.html',
        'w4c': 'w4c.html',
        //'w4c': '../web4core/src/',
        'custom': 'custom_banner.html',
        'format_disk_web': 'format_disk_web.html',
        'format': 'format.html',
        'dns-dot-chatgpt': 'dns-dot-chatgpt.html',
        'xray': 'xray.html',
        'xray-vless': 'xray-vless.html',
        'ipresolver': 'ipresolver.html'
      };

      if (pages[script]) {
        // Открываем соответствующую страницу
        window.location.href = pages[script];
      } else {
        alert('Страница пока недоступна');
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      if (document.body.classList.contains('dark')) {
        localStorage.setItem('theme', 'dark');
      } else {
        localStorage.setItem('theme', 'light');
      }
    }

    window.onload = () => {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
      }
    }
  </script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const hash = window.location.hash;
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

    // Условие: если есть hash — ничего не делать
        if (hash) {
        if (window.Telegram && Telegram.WebApp) {
            let tg = window.Telegram.WebApp;
            tg.expand();
            console.log('Telegram WebApp expanded из-за наличия hash:', hash);
        }
        return; // не выполнять остальной код (баннеры и т.д.)
    }

    // Если st
    //if (hash) return;

    // Условие: если standalone (например, PWA) — тоже ничего не делать
    if (isStandalone) return;

    // Далее только если нет hash и не standalone

    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent) && !navigator.standalone;
    const isAndroid = /Android/.test(navigator.userAgent);

    if (isIOS) {
        const banner = `<div style="position:fixed;bottom:0;width:100%;background-color:#f8f8f8;border-top:1px solid #ddd;padding:10px;text-align:center;z-index:1000;">
            <span>Установи приложение на iPhone/iPad: нажми <img src="/ios-share.svg" style="height:20px;vertical-align:middle;">, затем <img src="/ios-add.svg" style="height:20px;vertical-align:middle;"> «На экран Домой»</span>
            <button onclick="this.parentElement.style.display='none'">Закрыть</button>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', banner);
    }

    if (isAndroid) {
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const banner = `<div style="position:fixed;bottom:0;width:100%;background-color:#f8f8f8;border-top:1px solid #ddd;padding:10px;text-align:center;z-index:1000;">
                <span>Добавить приложение на главный экран Android</span>
                <button onclick="deferredPrompt.prompt(); deferredPrompt.userChoice.then(choice => { if (choice.outcome === 'accepted') console.log('Установлено'); deferredPrompt = null; });">Установить</button>
                <button onclick="this.parentElement.style.display='none'">Закрыть</button>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', banner);
        });
    }

    if (!isIOS && !isAndroid) {
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const banner = `<div style="position:fixed;bottom:0;width:100%;background-color:#f8f8f8;border-top:1px solid #ddd;padding:10px;text-align:center;z-index:1000;">
                <span>Добавить приложение на домашний экран ПК</span>
                <button onclick="deferredPrompt.prompt(); deferredPrompt.userChoice.then(choice => { if (choice.outcome === 'accepted') console.log('Установлено'); deferredPrompt = null; });">Установить</button>
                <button onclick="this.parentElement.style.display='none'">Закрыть</button>
            </div>`;
            document.body.insertAdjacentHTML('beforeend', banner);
        });
    }
});

// Регистрация service worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/entware.js')
            .then(reg => console.log('ServiceWorker registered:', reg.scope))
            .catch(err => console.log('ServiceWorker registration failed:', err));
    });
}
</script>
